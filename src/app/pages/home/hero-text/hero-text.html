<p class="text-sm tracking-widest uppercase text-green-400 mb-4">Hello, I'm</p>

<h1 class="text-6xl md:text-7xl lg:text-8xl mb-2 leading-none text-white">
  <div class="flex flex-wrap">
    @for (letter of firstNameLetters; track letter) {
      <span class="inline-block hover:text-emerald-400 transition-colors">
        {{letter}}
      </span>
    }
  </div>
  <div class="flex flex-wrap">
    @for (letter of lastNameLetters; track letter) {
      <span class="inline-block hover:text-emerald-400 transition-colors">
        {{letter}}
      </span>
    }
  </div>
</h1>

<div class="mt-6">
  <p class="text-xl md:text-2xl text-emerald-400 mb-2">Frontend/Web Developer</p>
  <p class="text-base text-green-200 max-w-md">
    Creating beautiful, functional, and user-friendly web experiences
  </p>
</div>

<div class="mt-8 flex gap-4">
  <a routerLink="/projects" class="px-6 py-3 bg-[#1a3a2a] text-white hover:bg-[#0f2419] transition rounded-lg border border-emerald-900/50">
    View My Work
  </a>
  <a routerLink="/contact" class="px-6 py-3 bg-[#1a3a2a] text-white hover:bg-[#0f2419] transition rounded-lg border border-emerald-900/50">
    Get In Touch
  </a>
</div>
