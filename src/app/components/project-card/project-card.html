<div
  class="flex flex-col h-full bg-black/40 backdrop-blur-sm rounded-xl border border-emerald-900/30 overflow-hidden
         hover:border-emerald-700/50 hover:bg-black/50 transition-all duration-300 group cursor-pointer"
  [routerLink]="['/projects', project.id]"
>
  <div class="relative h-48 overflow-hidden">
    <img [src]="project.image" [alt]="project.title" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
  </div>

  <div class="p-6 flex flex-col flex-grow">

    <h3 class="text-2xl font-bold text-white mb-3">
      {{ project.title }}
    </h3>

    <!-- LIMIT DESCRIPTION -->
    <p class="text-green-200 mb-4 line-clamp-3">
      {{ project.description }}
    </p>

    <!-- Tags -->
    <div class="flex flex-wrap gap-2 mb-4">
      @for (tag of project.tags; track tag) {
        <span class="bg-emerald-900/40 text-emerald-400 px-3 py-1 rounded-full text-sm font-semibold border border-emerald-800/50">
        {{ tag }}
      </span>
      }
    </div>

    <!-- Push links to bottom -->
    <div class="mt-auto flex space-x-4">
      @if (project.github) {
        <a [href]="project.github" target="_blank"
           class="text-emerald-400 hover:text-emerald-300"
           (click)="$event.stopPropagation()">
          Code
        </a>
      }
      @if (project.live) {
        <a [href]="project.live" target="_blank"
           class="text-emerald-400 hover:text-emerald-300"
           (click)="$event.stopPropagation()">
          Live Demo
        </a>
      }
    </div>

  </div>
</div>
